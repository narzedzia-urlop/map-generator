<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<div id="output"></div>
<script>
const images = [
  'images/Mapa świata.png',
  'images/Kreta.png',
  'images/Rodos.png',
  'images/Kos.png',
  'images/Zakhyntos.png'
];
const out = document.getElementById('output');

async function processImages() {
  for (let src of images) {
    await new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        
        let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
        for (let y = 0; y < canvas.height; y++) {
          for (let x = 0; x < canvas.width; x++) {
            const alpha = data[(y * canvas.width + x) * 4 + 3];
            if (alpha > 10) {
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
              if (y < minY) minY = y;
              if (y > maxY) maxY = y;
            }
          }
        }
        
        out.innerHTML += `<p>${src}: width=${img.width}, height=${img.height}, bbox=[${minX}, ${minY}, ${maxX}, ${maxY}], rxBounds=[${(minX/img.width).toFixed(3)}, ${(maxX/img.width).toFixed(3)}], ryBounds=[${(minY/img.height).toFixed(3)}, ${(maxY/img.height).toFixed(3)}]</p>`;
        resolve();
      };
      img.onerror = () => {
        out.innerHTML += `<p>Error loading ${src}</p>`;
        resolve();
      };
      img.src = src;
    });
  }
  out.innerHTML += "<p id='done'>DONE</p>";
}
processImages();
</script>
</body>
</html>
